<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <title>Checkout Page</title>
 </head>
 <body>
  <h1>Checkout</h1>
  <section>
   <h2>Your Cart</h2>
   <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="Cubo de rubig sobre una mesa blanca"/>
  </section>
  <section>
   <h2>Payment Information</h2>
   <form>
    <label for="card-name">Nombre de Tarjeta <span aria-hidden="true">*</span></label>
    <input type="text" id="card-name" name="card-name" required/>
    <label for="card-number">Numero de tarjeta <span aria-hidden="true">*</span></label>
    <input type="text" id="card-number" name="card-number" required aria-describedby="card-number-help">
    <p id="card-number-help">Por favor los numero de su tarjeta deben estar sin espacios y simbolos</p>
   </form>
  </section>
 </body>
</html>
